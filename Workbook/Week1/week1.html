<!DOCTYPE html>
<html>
    <head>
    <meta charset="UTF-8">
        <title>Hello World</title>
    <style>
        h1 {
            background-color: rgb(161, 9, 9);
            color: white;
            text-align: center;
        }
        p { 
            text-align: center;
        }
        img {
            display: block;
            margin-left: auto;
            margin-right: auto;
            width: 50%;
        }
       img:hover {
            transform: rotate(360deg);
            transition: transform 0.5s linear;
        }
    </style>
    </head>
    <body>
        <h1 style="font-family:Verdana, Geneva, Tahoma, sans-serif">I ALWAYS WIN :3</h1>    
        <img src="image.jpg" alt="Im winning"> 
        <p> (I am the Corgi) </p>
  </body>
</html>
